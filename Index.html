<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paylocity · Simplified SMB Payroll</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0E1117;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;color:#0F1923;line-height:1.5}
button,input,textarea,select{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.frame{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:28px 16px}
.phone{width:390px;height:844px;background:#FFFFFF;border-radius:48px;overflow:hidden;position:relative;
  box-shadow:0 0 0 8px #1A1A1A,0 0 0 10px #2A2A2A,0 40px 100px rgba(0,0,0,.7);display:flex;flex-direction:column}
.status{background:#fff;padding:14px 28px 8px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:#0F1923;flex-shrink:0}
.status-r{display:flex;gap:5px;align-items:center}
#screen-root{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;transition:opacity .15s}
#screen-root>*{animation:slide-up .18s cubic-bezier(0.23,1,0.32,1) both}
#screen-root::-webkit-scrollbar{width:0}
#bottom-nav{background:#fff;border-top:1px solid rgba(0,0,0,.06);padding:6px 0 22px;display:none;justify-content:space-around;align-items:center;flex-shrink:0}
.nb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;min-height:44px;justify-content:center}
.nl{font-size:10px;font-weight:500;line-height:1}
#sheet-overlay{display:none;position:absolute;inset:0;z-index:100;background:rgba(0,0,0,.5);border-radius:48px}
#sheet-content{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;max-height:82%;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
:root{
  --navy:#1B2B4B;--navy2:#0D1B2E;
  --g:#059669;--gb:#ECFDF5;--gt:#065F46;--gbr:#A7F3D0;
  --a:#D97706;--ab:#FFFBEB;--at:#92400E;--abr:#FDE68A;
  --r:#DC2626;--rb:#FEF2F2;
  --pu:#7C3AED;--pub:#EDE9FE;--put:#4C1D95;
  --t1:#0F1923;--t2:#374151;--t3:#6B7280;--t4:#9CA3AF;
  --bd:rgba(0,0,0,.06);--bg:#FFFFFF;--card:#F5F6F8;--ink:#191E29
}
:focus-visible{outline:2px solid var(--navy);outline-offset:2px;border-radius:4px}
.pi{padding:14px 19px 20px;display:flex;flex-direction:column;gap:11px;flex:1}
.ph{padding:13px 19px 11px;background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
.pt{font-size:17px;font-weight:700;color:var(--t1);line-height:1.2}
.ps{font-size:12px;color:var(--t3);margin-top:1px}
.card{background:#fff;border-radius:18px;border:0.5px solid var(--bd);box-shadow:none;transition:transform .12s,border-color .15s}
.card.tap:hover{border-color:rgba(0,0,0,.14)}
.card.tap:active{transform:scale(0.985)}
.cp{padding:14px 16px}
.btn{width:100%;padding:15px;border:none;border-radius:999px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .12s,transform .1s,box-shadow .15s;line-height:1.2}
.btn-k{background:var(--ink);color:#fff;box-shadow:none}
.btn-k:hover{background:#2A3040}
.btn-g{background:var(--g);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.2)}
.btn-o{background:#fff;border:1.5px solid #D5D9E0;color:var(--t1)}
.btn-r{background:var(--r);color:#fff}
.btn:disabled{opacity:.35;cursor:default;box-shadow:none}
.btn:not(:disabled):active{transform:scale(0.98)}
.inp{width:100%;padding:13px 14px;background:#fff;border:1.5px solid #DDE1E8;border-radius:11px;font-size:15px;color:var(--t1);outline:none;transition:border-color .15s,box-shadow .15s;line-height:1.4}
.inp:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,43,75,.08)}
.lbl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block;line-height:1.4}
.bk{background:none;border:none;font-size:18px;color:var(--t3);cursor:pointer;padding:8px;line-height:1;margin:-8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.badge-g{background:var(--gb);color:var(--gt);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;line-height:1.4}
.badge-a{background:var(--ab);color:var(--at);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;line-height:1.4}
.badge-r{background:var(--rb);color:var(--r);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;line-height:1.4}
.badge-n{background:#EFF6FF;color:#1D4ED8;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;line-height:1.4}
.badge-ai{background:var(--pub);color:var(--put);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:2px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;line-height:1.4}
.bn-g{background:var(--gb);border:1px solid var(--gbr);border-radius:12px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
.bn-a{background:var(--ab);border:1px solid var(--abr);border-radius:12px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
.opt{display:flex;align-items:center;padding:13px 14px;background:#fff;border:1.5px solid #DDE1E8;border-radius:12px;cursor:pointer;gap:10px;transition:border-color .15s,box-shadow .15s;min-height:44px}
.opt:hover{border-color:#B8BFCC;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.opt.sel{border-color:var(--navy);box-shadow:0 0 0 2px rgba(27,43,75,.1)}
.radio{width:18px;height:18px;border-radius:50%;border:2px solid #D1D5DB;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.opt.sel .radio{border-color:var(--navy);background:var(--navy)}
.opt.sel .radio::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.div{height:1px;background:rgba(0,0,0,.05)}
.tap{cursor:pointer;transition:opacity .12s,transform .1s}
.tap:active{opacity:.7;transform:scale(0.98)}
.row{display:flex;align-items:center;gap:10px;padding:13px 14px;background:#fff;border-radius:14px;border:0.5px solid var(--bd);cursor:pointer;transition:border-color .12s,transform .1s;min-height:44px}
.row:hover{border-color:rgba(0,0,0,.14)}
.row:active{opacity:.8;transform:scale(0.98)}
.chevron{color:var(--t4);font-size:13px;margin-left:auto}
@keyframes shim{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.35)}60%{box-shadow:0 0 0 5px rgba(217,119,6,0)}}
@keyframes slide-up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop-in{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes draw-check{to{stroke-dashoffset:0}}
.skel{background:linear-gradient(90deg,#F3F4F6 25%,#E9EAEC 50%,#F3F4F6 75%);background-size:200%;animation:shim 1.5s infinite;border-radius:5px}
.tab-row{display:flex;border-bottom:1.5px solid #E5E7EB;margin-bottom:14px}
.tab{flex:1;padding:9px 0;background:none;border:none;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color .15s}
.tab.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
input[type=range].conf-slider{-webkit-appearance:none;width:100%;height:5px;border-radius:4px;background:transparent;outline:none;cursor:pointer}
input[type=range].conf-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--navy2);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25)}
input[type=range].conf-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--navy2);cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.sl{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.ht{display:flex;background:#ECEEF1;border-radius:10px;padding:3px;margin-bottom:12px}
.htb{flex:1;padding:7px 0;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:background .12s,box-shadow .12s,color .12s}
.htb.on{background:#fff;font-weight:600;color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.htb:not(.on){background:none;color:var(--t3)}
.stat2{display:flex;gap:22px}
.s-val{font-size:24px;font-weight:800;color:var(--t1);letter-spacing:-.02em;line-height:1.05;font-variant-numeric:tabular-nums}
.s-lbl{font-size:10px;color:var(--t4);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stepper{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 6px 14px;border:none;border-radius:12px;margin-bottom:7px;background:var(--card);min-height:44px}
.stepper.ot{background:var(--ab)}
.st-lbl{font-size:12px;font-weight:600;color:var(--t2);flex:1}
.stepper.ot .st-lbl{color:var(--at)}
.st-ctl{display:flex;align-items:center;gap:2px}
.stepbtn{width:32px;height:32px;border-radius:10px;border:1.5px solid #E1E4EA;background:#fff;font-size:16px;font-weight:600;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;flex-shrink:0}
.stepbtn:active{opacity:.6}
.st-val{font-size:15px;font-weight:700;color:var(--t1);min-width:34px;text-align:center;font-variant-numeric:tabular-nums}
.comp-line{background:var(--gb);border:1px solid var(--gbr);border-radius:12px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px}
.comp-line.exp-open{border-radius:12px 12px 0 0}
.comp-body{background:#fff;border:1px solid var(--gbr);border-top:none;border-radius:0 0 12px 12px;padding:2px 13px 8px}
/* ── new: bank sufficiency card ── */
.bank-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:12px}
.bank-row:last-child{border-bottom:none}
/* ── header icon (NL entry) ── */
.hdr-ic{background:none;border:none;cursor:pointer;color:var(--t2);padding:10px;display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;border-radius:10px;transition:background .12s}
.hdr-ic:hover{background:rgba(0,0,0,.05)}
.dev-pill{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;z-index:5;letter-spacing:.03em}
</style>
</head>

// av() — real photo on top, inline SVG face as fallback underneath
function av(id,pending,sz){
  sz=sz||34;
  var c=sz/2;
  var face=FACES[id];
  var ring=pending?';box-shadow:0 0 0 2px #fff,0 0 0 4px var(--a)':'';
  var fallback;
  if(!face){
    fallback='<div style="width:100%;height:100%;background:#1E293B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*.32)+'px;font-weight:600">'+id+'</div>';
  } else {
    var isLong=face.hl==='long',isMed=face.hl==='medium';
    var hcy=sz*(isLong?0.24:isMed?0.20:0.17);
    var hrx=sz*0.44,hry=sz*(isLong?0.40:isMed?0.28:0.19);
    var sideH='';
    if(isLong){sideH='<ellipse cx="'+(c-sz*0.31)+'" cy="'+(sz*0.61)+'" rx="'+(sz*0.13)+'" ry="'+(sz*0.22)+'" fill="'+face.h+'"/><ellipse cx="'+(c+sz*0.31)+'" cy="'+(sz*0.61)+'" rx="'+(sz*0.13)+'" ry="'+(sz*0.22)+'" fill="'+face.h+'"/>';}
    else if(isMed){sideH='<ellipse cx="'+(c-sz*0.30)+'" cy="'+(sz*0.55)+'" rx="'+(sz*0.12)+'" ry="'+(sz*0.16)+'" fill="'+face.h+'"/><ellipse cx="'+(c+sz*0.30)+'" cy="'+(sz*0.55)+'" rx="'+(sz*0.12)+'" ry="'+(sz*0.16)+'" fill="'+face.h+'"/>';}
    var fcy=sz*0.55,fr=sz*0.34;
    var ey=sz*0.50,er=Math.max(1,sz*0.028);
    var my=sz*0.61,mqy=my+sz*0.038;
    fallback='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'" style="display:block">'
      +'<circle cx="'+c+'" cy="'+c+'" r="'+c+'" fill="'+face.bg+'"/>'
      +sideH
      +'<ellipse cx="'+c+'" cy="'+hcy+'" rx="'+hrx+'" ry="'+hry+'" fill="'+face.h+'"/>'
      +'<circle cx="'+c+'" cy="'+fcy+'" r="'+fr+'" fill="'+face.s+'"/>'
      +'<circle cx="'+(c-sz*0.09)+'" cy="'+ey+'" r="'+er+'" fill="rgba(15,8,3,.78)"/>'
      +'<circle cx="'+(c+sz*0.09)+'" cy="'+ey+'" r="'+er+'" fill="rgba(15,8,3,.78)"/>'
      +'<path d="M'+(c-sz*0.07)+' '+my+' Q'+c+' '+mqy+' '+(c+sz*0.07)+' '+my+'" stroke="rgba(100,45,45,.55)" stroke-width="'+Math.max(1,sz*0.023)+'" fill="none" stroke-linecap="round"/>'
      +'</svg>';
  }
  var img=PHOTO[id]?'<img src="'+PHOTO[id]+'" alt="" loading="lazy" onerror="this.style.display=\'none\'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">':'';
  return '<div style="position:relative;width:'+sz+'px;height:'+sz+'px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#E5E7EB'+ring+'">'
    +fallback+img+'</div>';
}

function fmt(n){return '$'+Math.round(n).toLocaleString();}
function empGross(e){
  if(e.type==='Hourly'){
    var rate=parseFloat((e.rate||'0').replace(/[^0-9.]/g,''))||0;
    var otRate=(e.otRate!=null)?e.otRate:rate*1.5;
    var h=e.hrs||{hourly:0,pto:0,holiday:0,ot:0};
    return Math.round(rate*h.hourly + rate*h.pto + rate*h.holiday + otRate*h.ot);
  }
  var annual=parseFloat((e.rate||'0').replace(/[^0-9.]/g,''))||0;
  return Math.round(annual/26);
}
function empHoursTotal(e){
  var h=e.hrs||{hourly:0,pto:0,holiday:0,ot:0};
  return h.hourly+h.pto+h.holiday+h.ot;
}

  if(toastTimer) clearTimeout(toastTimer);

}

function updateNav(screen){

function go(screen,opts){
  opts=opts||{};if(opts.from)S.from=opts.from;S.screen=screen;
  if(screen==='collectMethod'){ S.collectMethod=null; S.collectStage='idle'; }
  if(screen==='connectBankStep'){ S.bankConnectStage='choose'; }
  var root=document.getElementById('screen-root');
  root.style.opacity='0';
  setTimeout(function(){root.innerHTML=draw(screen);root.style.opacity='1';updateNav(screen);
    window.scrollTo(0,0); root.scrollTop=0;
  },120);
}
function re(screen){
  var root=document.getElementById('screen-root');
  // re() replaces the whole subtree via innerHTML, which would otherwise reset
  // scroll to the top — find whichever element is the screen's actual scroll
  // region and carry its position across the re-render.
  var scrollEl=root.querySelector('[style*="overflow-y:auto"]')||root;
  var savedTop=scrollEl.scrollTop;
  root.innerHTML=draw(screen||S.screen);
  var newScrollEl=root.querySelector('[style*="overflow-y:auto"]')||root;
  newScrollEl.scrollTop=savedTop;
}

      +'</div></div>';
  }
  // ── Expanded input: pill field with inline send + quiet suggestion chips ──
  var examples=["Add 8 hrs PTO for Aisha","What's my bank balance?","Move payment to today"];
  var hasText=!!S.nlInput;
  return '<div style="background:#fff;border:1.5px solid #E8EAED;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:8px 8px 8px 14px;display:flex;flex-direction:column;gap:9px">'

    +'<button id="nl-send" onclick="'+(hasText?'submitNL()':'cancelNL()')+'" style="flex-shrink:0;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:'+(hasText?'var(--navy)':'#F3F4F6')+';color:'+(hasText?'#fff':'var(--t3)')+';transition:background .15s">'+(hasText?sendIcon():'✕')+'</button>'
    +'</div>'
    +'<div id="nl-chips" style="display:flex;gap:6px;flex-wrap:wrap;'+(hasText?'display:none':'')+'">'+examples.map(function(ex){return '<button onclick="S.nlInput=\''+ex.replace(/'/g,"\\'")+'\';submitNL()" style="background:none;border:1px solid #E8EAED;border-radius:16px;padding:5px 11px;font-size:11px;color:var(--t3);cursor:pointer">'+ex+'</button>';}).join('')+'</div>'
    +'</div>';
}
// Toggle send-button affordance + hide chips as the user types, without a full re-render
function syncNLSend(){
  var inp=document.getElementById('nl-in'); if(!inp) return;
  var has=!!inp.value;
  var btn=document.getElementById('nl-send');
  var chips=document.getElementById('nl-chips');
  if(btn){
    btn.style.background=has?'var(--navy)':'#F3F4F6';
    btn.style.color=has?'#fff':'var(--t3)';
    btn.innerHTML=has?sendIcon():'✕';
    btn.setAttribute('onclick', has?'submitNL()':'cancelNL()');
  }
  if(chips){ chips.style.display=has?'none':'flex'; }
}

  if(name==='check') return S+'<polyline points="20 6 9 17 4 12"/></svg>';

function submitNL(){
  if(!S.nlInput) return;
  S.nlPendingAction=matchNLIntent(S.nlInput);
  S.nlStage='confirm';
  re();
}
function applyNL(){
  var act=S.nlPendingAction;
  if(act&&act.action) act.action();
  S.nlActive=false; S.nlStage='input'; S.nlInput=''; S.nlPendingAction=null;
  re();
  if(act&&act.toast) toast(act.toast);
}
function cancelNL(){
  S.nlActive=false; S.nlStage='input'; S.nlInput=''; S.nlPendingAction=null;
  re();
}

// "Past" tab content — tucked-in Previous Payrolls list (was screen 11a)
function pastPayrollsBody(){
  // Trend card — oldest to newest, inline SVG sparkline with area fill
  var pts=PAY_HIST.slice().reverse();
  var vals=pts.map(function(p){return p.amount;});
  var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals), span=max-min||1;
  var W=300,H=56,PAD=6;
  var coords=vals.map(function(v,i){

  });
  var line=coords.map(function(c,i){return (i?'L':'M')+c[0]+' '+c[1];}).join(' ');
  var area=line+' L'+coords[coords.length-1][0]+' '+(H-1)+' L'+coords[0][0]+' '+(H-1)+' Z';

    +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">'
    +'<div class="sl" style="margin:0">Labor cost · last '+vals.length+' periods</div>'

    +'<path d="'+area+'" fill="rgba(27,43,75,.07)"/>'
    +'<path d="'+line+'" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +coords.map(function(c,i){return '<circle cx="'+c[0]+'" cy="'+c[1]+'" r="'+(i===coords.length-1?3.5:2)+'" fill="'+(i===coords.length-1?'var(--navy)':'#B7C0D0')+'"/>';}).join('')
    +'</svg>'

    +'</div>';

    return '<div class="row tap" onclick="S.historySelected='+i+';go(\'payHistoryDetail\')"><div style="flex:1"><div style="font-size:13px;font-weight:600">'+p.date+' · '+fmt(p.amount)+'</div><div style="font-size:11px;color:var(--t3)">'+p.label+' · '+p.emp+' employees</div></div>'

// SVG donut chart — segments: [{label, value, color}]. Center shows total + unit.
// Horizontal stacked bar — one bar, segments proportional to value.
function stackedBar(segments){
  var total=segments.reduce(function(s,x){return s+x.value;},0)||1;
  return '<div style="display:flex;width:100%;height:14px;border-radius:7px;overflow:hidden;background:#F1F2F4">'
    +segments.map(function(seg){
      var pct=seg.value/total*100;
      return pct>0?'<div style="width:'+pct+'%;background:'+seg.color+'"></div>':'';
    }).join('')
    +'</div>';
}
// Wrapping legend chips under a bar — dot + label + value + share%.
function barLegendChips(segments, unit){
  var total=segments.reduce(function(s,x){return s+x.value;},0)||1;
  return '<div style="display:flex;flex-wrap:wrap;gap:7px 14px;margin-top:9px">'
    +segments.map(function(seg){
      var pct=Math.round(seg.value/total*100);
      var valStr=unit==='$'?fmt(seg.value):seg.value+'h';
      return '<div style="display:flex;align-items:center;gap:5px">'
        +'<span style="width:8px;height:8px;border-radius:2px;background:'+seg.color+';flex-shrink:0"></span>'
        +'<span style="font-size:11px;color:var(--t2)">'+seg.label+'</span>'
        +'<span style="font-size:11px;font-weight:700;color:var(--t1)">'+valStr+'</span>'
        +'<span style="font-size:10px;color:var(--t4)">'+pct+'%</span>'
        +'</div>';
    }).join('')
    +'</div>';
}
function barBlock(title, segments, unit){
  return '<div><div class="sl" style="margin-bottom:8px">'+title+'</div>'
    +stackedBar(segments)
    +barLegendChips(segments, unit)
    +'</div>';
}
// Bar + legend with no title/label above it.
function barOnly(segments, unit){
  return '<div>'+stackedBar(segments)+barLegendChips(segments, unit)+'</div>';
}

  var taxDetail=['Federal withholding','FICA (employer + employee)','Illinois state withholding','Illinois SUI'].map(function(t,i){return '<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--t2)"><span>'+t+'</span><span>'+fmt([4200,3100,1200,440][i])+'</span></div>';}).join('');

  // Category palette — deep, saturated tones that hold up on the tinted hero.
  var CAT={hourly:'#1B2B4B', pto:'#6D28D9', holiday:'#0F766E', ot:'#C2410C'};

  // Total hours (for the headline stat) — summed live from every employee's hours.

  EMP.forEach(function(e){var h=e.hrs||{};hoursByType.hourly+=h.hourly||0;hoursByType.pto+=h.pto||0;hoursByType.holiday+=h.holiday||0;hoursByType.ot+=h.ot||0;});
  var hoursTotal=hoursByType.hourly+hoursByType.pto+hoursByType.holiday+hoursByType.ot;

  // Gross pay stratified by pay type (illustrative, ties to TOTALS.gross).

    {label:'PTO',value:780,color:CAT.pto},

  var grossTotal=grossSegs.reduce(function(s,x){return s+x.value;},0);

  var byType=[['Regular',grossSegs.find(function(s){return s.label==='Regular';})],['Overtime',grossSegs.find(function(s){return s.label==='Overtime';})],['PTO',grossSegs.find(function(s){return s.label==='PTO';})],['Holiday',grossSegs.find(function(s){return s.label==='Holiday';})]];
  var typeRows=byType.filter(function(r){return r[1];}).map(function(r){return '<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:var(--t2)"><span>'+r[0]+'</span><span>'+fmt(r[1].value)+'</span></div>';}).join('');

      +'<div class="tap" onclick="var b=document.getElementById(\''+id+'\');var open=b.style.display!==\'none\';b.style.display=open?\'none\':\'block\';document.getElementById(\''+id+'-chev\').textContent=open?\'▼\':\'▲\'" style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">'
      +'<span style="font-size:12px;color:var(--t2)">'+title+'</span>'
      +'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:var(--t2)">'+fmt(amount)+'</span><span class="chevron" id="'+id+'-chev" style="font-size:11px">▼</span></div>'
      +'</div>'
      +'<div id="'+id+'" style="display:none;padding:0 0 6px 8px">'+detail+'</div>'
      +'</div>';

function adjOtRateInline(empId,value){
  var e=EMP.find(function(x){return x.id===empId;});
  if(!e)return;
  var hourlyRate=parseFloat((e.rate||'0').replace(/[^0-9.]/g,''))||0;
  e.otRate=parseFloat(value)||0;
  if(hourlyRate>0){
    e.otMultiplier=Math.round((e.otRate/hourlyRate)*10)/10;
    var multEl=document.getElementById('ot-mult-'+empId);
    if(multEl) multEl.textContent=e.otMultiplier.toFixed(1)+'×';
  }
  var g=document.getElementById('hr-gross-'+empId);
  if(g) g.textContent=fmt(empGross(e))+' gross this period';
  var headline=document.getElementById('row-gross-'+empId);
  if(headline) headline.textContent=fmt(empGross(e));
}
function adjOtMultiplier(empId,delta){
  var e=EMP.find(function(x){return x.id===empId;});
  if(!e)return;
  var hourlyRate=parseFloat((e.rate||'0').replace(/[^0-9.]/g,''))||0;
  var m=(e.otMultiplier!=null?e.otMultiplier:1.5)+delta;
  m=Math.max(1,Math.round(m*10)/10);
  e.otMultiplier=m;
  e.otRate=Math.round(hourlyRate*m*100)/100;
  var multEl=document.getElementById('ot-mult-'+empId);
  if(multEl) multEl.textContent=m.toFixed(1)+'×';
  var otInput=document.getElementById('ot-rate-input-'+empId);
  if(otInput) otInput.value=e.otRate;
  var g=document.getElementById('hr-gross-'+empId);
  if(g) g.textContent=fmt(empGross(e))+' gross this period';
  var headline=document.getElementById('row-gross-'+empId);
  if(headline) headline.textContent=fmt(empGross(e));
}
function adjHourInline(empId,field,delta){
  var e=EMP.find(function(x){return x.id===empId;});

  e.hrs[field]=Math.max(0,(e.hrs[field]||0)+delta);

function updateOTAdjust(field,delta){
  if(field==='hrs'){ var h=(S.otAdjHrs||4)+delta; if(h<0||h>40) return; S.otAdjHrs=h; }
  else { var r=(S.otAdjRate||34)+delta; if(r<20||r>100) return; S.otAdjRate=r; }
  var sc=otScenario();
  var el;
  el=document.getElementById('ot-adj-hrs');  if(el) el.textContent=sc.hrs;
  el=document.getElementById('ot-adj-rate'); if(el) el.textContent='$'+sc.rate;
  el=document.getElementById('ot-adj-sub');  if(el) el.textContent='Adjusted: '+sc.hrs+' OT hrs \u00D7 1.5\u00D7 = '+fmt(sc.otPay);
  el=document.getElementById('ot-bd-ot');
  if(el){ el.textContent=sc.otPay>0?'+'+fmt(sc.otPay):'\u2014'; el.style.color=sc.otPay>0?'var(--pu)':'var(--t4)'; }
  el=document.getElementById('ot-bd-total'); if(el){ el.textContent=fmt(sc.total); }
}
function confirmOT(){
  var mt=EMP.find(function(e){return e.id==='MT';});
  if(mt){ mt.hrs.ot = (S.otDecision==='remove') ? 0 : otScenario().hrs; }
  S.otResolved=true; go('payrollReview');
}

function payHistoryDetail(){
  var p=PAY_HIST[S.historySelected!=null?S.historySelected:0];

  // Per-employee figures for this period, derived from YTD (÷ periods elapsed)
  // so each row's gross/taxes/deductions/net stay internally consistent.
  var PERIODS=6;
  function perEmp(e){
    var y=e.ytd||{g:0,n:0,t:0,k:0};
    var gross=Math.round((y.g||0)/PERIODS);
    var taxes=Math.round((y.t||0)/PERIODS);
    var net=Math.round((y.n||0)/PERIODS);
    var ded=Math.max(0,gross-taxes-net);
    var isH=e.type==='Hourly';
    var hrs=isH?(80+((e.hrs&&e.hrs.ot)||0)):null;
    return {gross:gross,taxes:taxes,net:net,ded:ded,isH:isH,hrs:hrs};
  }
  var totalGross=0,totalTax=0,totalNet=0,totalDed=0;
  var empRows=EMP.map(function(e,i){
    var d=perEmp(e);
    totalGross+=d.gross; totalTax+=d.taxes; totalNet+=d.net; totalDed+=d.ded;
    return '<div class="tap" onclick="showEmp(\''+e.id+'\',\'payHistoryDetail\')" style="padding:13px 0;'+(i<EMP.length-1?'border-bottom:1px solid rgba(0,0,0,.06);':'')+'display:flex;align-items:flex-start;gap:10px">'
      +av(e.id,false,34)
      +'<div style="flex:1">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'

          +'<div style="text-align:right;flex-shrink:0;margin-left:12px"><div style="font-size:14px;font-weight:700;color:var(--t1)">'+fmt(d.gross)+'</div><div style="font-size:10px;color:var(--t4)">gross</div></div>'
        +'</div>'
        +'<div style="display:flex;gap:18px;margin-top:7px">'
          +'<div><span style="font-size:10px;color:var(--t4)">Taxes </span><span style="font-size:12px;font-weight:600;color:var(--t2)">'+fmt(d.taxes)+'</span></div>'
          +'<div><span style="font-size:10px;color:var(--t4)">Ded </span><span style="font-size:12px;font-weight:600;color:var(--t2)">'+fmt(d.ded)+'</span></div>'
          +'<div><span style="font-size:10px;color:var(--gt)">Net </span><span style="font-size:12px;font-weight:700;color:var(--gt)">'+fmt(d.net)+'</span></div>'
        +'</div>'
      +'</div></div>';
  }).join('');

  // Compliance — same tile everywhere, navigates to the full checklist page
  var complianceBlock='<div class="card cp tap" onclick="S.complianceContext='+(S.historySelected!=null?S.historySelected:0)+';go(\'complianceDetail\',{from:\'payHistoryDetail\'})" style="display:flex;align-items:center;gap:11px">'
    +'<span style="width:28px;height:28px;border-radius:50%;background:var(--gb);color:var(--g);font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center">✓</span>'
    +'<span style="flex:1;font-size:13px;font-weight:600;color:var(--t1)">'+(p.issues?'1 exception auto-resolved':'All compliance checks passed')+'</span>'
    +'<span class="chevron">›</span>'
  +'</div>';

  return '<div style="background:var(--bg);flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">'
  +'<div class="ph" style="display:flex;align-items:center;gap:10px"><button class="bk" onclick="S.homeTab=\'past\';go(\'home\')">←</button><div><div class="pt">'+p.date+' payroll</div><div class="ps">'+p.label+', 2026 · Tag: 11b</div></div></div>'
  +'<div style="flex:1;min-height:0;overflow-y:auto;padding:14px 18px 20px;display:flex;flex-direction:column;gap:12px">'
  // Totals block (gross / taxes / deductions / net)
  +'<div style="background:#F3F4F6;border-radius:12px;padding:13px 15px">'
    +'<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Totals · '+EMP.length+' employees</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
    +'<div><div style="font-size:10px;color:var(--t4);margin-bottom:2px">Gross wages</div><div style="font-size:14px;font-weight:700;color:var(--t1)">'+fmt(totalGross)+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--t4);margin-bottom:2px">Taxes withheld</div><div style="font-size:14px;font-weight:700;color:var(--t1)">'+fmt(totalTax)+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--t4);margin-bottom:2px">Deductions</div><div style="font-size:14px;font-weight:700;color:var(--t1)">'+fmt(totalDed)+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--gt);margin-bottom:2px">Net deposited</div><div style="font-size:14px;font-weight:700;color:var(--g)">'+fmt(totalNet)+'</div></div>'
    +'</div></div>'
  // Compliance — one-liner, expands in line to the full checklist
  +complianceBlock
  // All employees, full detail
  +'<div class="card" style="padding:2px 15px 4px"><div class="sl" style="margin:12px 0 2px">Employees</div>'+empRows+'</div>'
  +'</div></div>';
}

// ══════════════════════════════════════════════════════════
// 9c — AUTOMATION LEVEL (ported from the original onboarding slider)
// The "how much should Paylocity handle on its own?" control, now a
// Settings destination rather than an onboarding step. The threshold
// (S.confidenceThreshold) decides which individual checks auto-resolve
// vs. require your approval; each check also has a confidence floor
// (confLevel) below which it always needs sign-off.
// ══════════════════════════════════════════════════════════
var COMP_RULES=[
  {id:'dd',   confLevel:92, label:'Direct deposit required',  desc:'Employees must have a bank account on file to receive payment.',   cat:'Employee',   severity:'approval', threshold:null},
  {id:'tax',  confLevel:58, label:'Tax withholding verified', desc:'All employees must have a valid W-4 or W-9 on file.',             cat:'Compliance', severity:'auto',     threshold:null},
  {id:'class',confLevel:78, label:'Employee classification',   desc:'Exempt vs. non-exempt status reviewed before each run.',          cat:'Compliance', severity:'approval', threshold:null},
  {id:'rates',confLevel:72, label:'Pay rate changes',          desc:'Flag unexpected pay rate changes above threshold.',               cat:'Payroll',    severity:'approval', threshold:10, unit:'%'},
  {id:'ot',   confLevel:62, label:'Overtime rules',            desc:'Apply jurisdiction OT rules and flag hours over threshold.',      cat:'Payroll',    severity:'auto',     threshold:40, unit:'hrs/week'},
  {id:'ach',  confLevel:56, label:'ACH account validated',     desc:'Confirm banking credentials before each deposit.',               cat:'Banking',    severity:'auto',     threshold:null},
  {id:'ded',  confLevel:68, label:'Deductions reconciled',     desc:'Benefits and deductions must match HR records within variance.',  cat:'Deductions', severity:'auto',     threshold:5,  unit:'% variance'},
  {id:'state',confLevel:82, label:'State compliance',          desc:'Check jurisdiction-specific filing and payment rules.',           cat:'Compliance', severity:'approval', threshold:null},
];
function initCompRules(){
  S.compRules={};
  COMP_RULES.forEach(function(r){ S.compRules[r.id]={enabled:true,severity:r.severity,threshold:r.threshold}; });
}
function autoMode(v){
  return v>=90?{label:'Fully hands-off',bg:'var(--gb)',clr:'var(--gt)',dot:'var(--g)'}
        :v>=75?{label:'Mostly automatic',bg:'var(--ab)',clr:'var(--at)',dot:'var(--a)'}
              :{label:'Ask me first',bg:'#F5F3FF',clr:'#4C1D95',dot:'var(--pu)'};
}
function autoDesc(v,autoCount){
  var n=COMP_RULES.length;
  return v>=90?autoCount+' of '+n+" checks resolve automatically. You'll only hear about unusual edge cases."
        :v>=75?autoCount+' of '+n+' checks auto-resolve. Anything unusual needs your sign-off.'
              :autoCount+' of '+n+' checks auto-resolve. Most changes need your approval before running.';
}
// Retrospective simulation — issues flagged over the last quarter, each tied to
// a check. The preview shows what THIS threshold would have done back then.
var RETRO_ISSUES=[
  {check:'ot',   conf:62, label:'Apr 30 · Marcus OT (3.5 hrs)'},
  {check:'ded',  conf:68, label:'May 15 · dental variance $12'},
  {check:'rates',conf:72, label:'May 31 · Elena raise +8%'},
  {check:'tax',  conf:58, label:'Jun 15 · W-4 refresh (2 people)'},
];
function retroSplit(val){
  var auto=RETRO_ISSUES.filter(function(x){return val>=x.conf;});
  return {auto:auto.length, asked:RETRO_ISSUES.length-auto.length};
}
function retroHtml(val){
  var s=retroSplit(val);
  return '<div style="display:flex;gap:14px;margin-bottom:8px">'
    +'<div><span style="font-size:22px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums">'+s.auto+'</span><span style="font-size:11px;color:var(--t3)"> auto-fixed</span></div>'
    +'<div><span style="font-size:22px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums">'+s.asked+'</span><span style="font-size:11px;color:var(--t3)"> would\u2019ve asked you</span></div>'
    +'</div>'
    +RETRO_ISSUES.map(function(x){
      var a=val>=x.conf;
      return '<div style="display:flex;align-items:center;gap:7px;padding:4px 0;font-size:11px;color:var(--t3)"><span style="width:6px;height:6px;border-radius:50%;background:'+(a?'var(--pu)':'var(--a)')+';flex-shrink:0"></span>'+x.label+' — <span style="font-weight:600;color:'+(a?'#5B21B6':'#92400E')+'">'+(a?'auto':'ask')+'</span></div>';
    }).join('');
}
function updateConf(val){
  val=Math.max(50,Math.min(100,Math.round(val/5)*5));
  S.confidenceThreshold=val;
  var pct=((val-50)/50*100).toFixed(0);
  var autoCount=COMP_RULES.filter(function(r){return val>=r.confLevel;}).length;
  var m=autoMode(val), desc=autoDesc(val,autoCount);
  var el;
  el=document.getElementById('conf-pct');   if(el) el.firstChild.nodeValue=val;
  el=document.getElementById('conf-bar');    if(el) el.style.width=pct+'%';
  el=document.getElementById('conf-slider'); if(el) el.value=val;
  el=document.getElementById('conf-mode');   if(el) el.style.background=m.bg;
  el=document.getElementById('conf-dot');    if(el) el.style.background=m.dot;
  el=document.getElementById('conf-mlabel'); if(el){el.textContent=m.label;el.style.color=m.clr;}
  el=document.getElementById('conf-mdesc');  if(el){el.textContent=desc;el.style.color=m.clr;el.style.opacity='.85';}
  COMP_RULES.forEach(function(r){
    var b=document.getElementById('cbadge-'+r.id); if(!b) return;
    var app=val<r.confLevel;
    b.textContent=app?'Requires approval':'Auto-fix';
    b.style.background=app?'#FEF3C7':'#EDE9FE';
    b.style.color=app?'#92400E':'#5B21B6';
  });
  el=document.getElementById('retro-body'); if(el) el.innerHTML=retroHtml(val);
}
function automation(){
  if(!S.compRules||!Object.keys(S.compRules).length) initCompRules();
  var ct=S.confidenceThreshold||90;
  var autoCount=COMP_RULES.filter(function(r){return ct>=r.confLevel;}).length;
  var m=autoMode(ct), desc=autoDesc(ct,autoCount), pct=((ct-50)/50*100).toFixed(0);

  var rows=COMP_RULES.map(function(r){
    var app=ct<r.confLevel, st=S.compRules[r.id]||{};
    return '<div class="tap" onclick="showCompSheet(\''+r.id+'\')" style="display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid rgba(0,0,0,.05)">'
      +'<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px">'
      +'<span style="font-size:13px;font-weight:600;color:var(--t1)">'+r.label+'</span>'
      +'<span id="cbadge-'+r.id+'" style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+(app?'#FEF3C7':'#EDE9FE')+';color:'+(app?'#92400E':'#5B21B6')+'">'+(app?'Requires approval':'Auto-fix')+'</span>'
      +'</div>'
      +'<span style="font-size:11px;color:var(--t4)">'+r.cat+(r.threshold!==null?' · '+st.threshold+' '+r.unit:'')+'</span>'
      +'</div><span class="chevron">›</span></div>';
  }).join('');

  return '<div style="background:var(--bg);flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">'
  +subHeader('settings','Automation level','Tag: 9c')
  +'<div style="flex:1;min-height:0;overflow-y:auto">'
    +'<div style="background:#fff;padding:20px 20px 18px;border-bottom:1px solid rgba(0,0,0,.06)">'
    +'<div style="font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-.02em;line-height:1.25;margin-bottom:8px">How much should Paylocity handle on its own?</div>'
    +'<div style="font-size:13px;color:var(--t3);line-height:1.6">Before every payroll, Paylocity runs '+COMP_RULES.length+' checks. Slide higher to let it fix more automatically — or lower to approve changes yourself.</div>'
    +'</div>'
    +'<div style="padding:16px 18px">'
      +'<div style="background:#fff;border-radius:16px;padding:18px;border:1px solid rgba(0,0,0,.06);margin-bottom:14px">'
        +'<div style="font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px">Automatically resolve issues at</div>'
        +'<div id="conf-pct" style="font-size:64px;font-weight:900;color:var(--t1);letter-spacing:-.04em;line-height:1;margin-bottom:4px">'+ct+'<span style="font-size:32px;font-weight:600;color:var(--t3)">%</span></div>'
        +'<div style="font-size:12px;color:var(--t3);margin-bottom:16px">confidence or higher</div>'
        +'<div style="position:relative;height:22px;margin-bottom:10px">'
        +'<div style="position:absolute;top:50%;left:0;right:0;height:5px;background:#E5E7EB;border-radius:4px;transform:translateY(-50%)"></div>'
        +'<div id="conf-bar" style="position:absolute;top:50%;left:0;height:5px;background:var(--navy2);border-radius:4px;transform:translateY(-50%);width:'+pct+'%;pointer-events:none"></div>'
        +'<input id="conf-slider" type="range" min="50" max="100" step="5" value="'+ct+'" class="conf-slider" oninput="updateConf(parseInt(this.value))" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2">'
        +'</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
        +'<span style="font-size:11px;color:var(--t4)">50% — always ask</span>'
        +'<div style="display:flex;gap:6px">'
        +'<button onclick="updateConf((S.confidenceThreshold||90)-5)" style="width:38px;height:34px;border-radius:9px;border:1.5px solid #E5E7EB;background:#fff;font-size:18px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">−</button>'
        +'<button onclick="updateConf((S.confidenceThreshold||90)+5)" style="width:38px;height:34px;border-radius:9px;border:1.5px solid #E5E7EB;background:#fff;font-size:18px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">+</button>'
        +'</div>'
        +'<span style="font-size:11px;color:var(--t4)">100% — fully auto</span>'
        +'</div>'
        +'<div id="conf-mode" style="background:'+m.bg+';border-radius:10px;padding:11px 13px">'
        +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px"><div id="conf-dot" style="width:7px;height:7px;border-radius:50%;background:'+m.dot+';flex-shrink:0"></div>'
        +'<span id="conf-mlabel" style="font-size:13px;font-weight:700;color:'+m.clr+'">'+m.label+'</span></div>'
        +'<div id="conf-mdesc" style="font-size:12px;color:'+m.clr+';opacity:.85;line-height:1.55">'+desc+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="background:#fff;border-radius:16px;padding:15px 16px;border:1px solid rgba(0,0,0,.06);margin-bottom:14px">'
      +'<div class="sl" style="margin-bottom:10px">If this had been on last quarter</div>'
      +'<div id="retro-body">'+retroHtml(ct)+'</div>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">'
      +'<div class="sl">Individual checks ('+COMP_RULES.length+')</div>'
      +'<span style="font-size:11px;color:var(--t3)">Tap to edit</span>'
      +'</div>'
      +'<div style="background:#fff;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,.06)">'+rows+'</div>'
    +'</div>'
  +'</div>'
  +'</div>';
}
function showCompSheet(id){
  var r=COMP_RULES.find(function(x){return x.id===id;}); if(!r) return;
  var state=S.compRules[id];
  var tRow='';
  if(r.threshold!==null){
    tRow='<div style="margin-top:16px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Threshold</div>'
      +'<div style="display:flex;align-items:center;gap:12px;background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:11px;padding:10px 14px">'
      +'<span style="flex:1;font-size:22px;font-weight:700;color:var(--t1)" id="ct-val">'+state.threshold+'</span>'
      +'<span style="font-size:12px;color:var(--t4)">'+r.unit+'</span>'
      +'<div style="display:flex;flex-direction:column;gap:4px">'
      +'<button id="ct-up" style="width:30px;height:26px;border:1.5px solid #E5E7EB;border-radius:6px;background:#fff;font-size:14px;cursor:pointer">↑</button>'
      +'<button id="ct-dn" style="width:30px;height:26px;border:1.5px solid #E5E7EB;border-radius:6px;background:#fff;font-size:14px;cursor:pointer">↓</button>'
      +'</div></div></div>';
  }
  var sev=state.severity;
  showSheet('<div style="padding:20px 18px 30px">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'
    +'<div><div style="font-size:16px;font-weight:700;color:var(--t1);margin-bottom:5px">'+r.label+'</div>'
    +'<span style="font-size:10px;color:var(--t4);background:#F3F4F6;border-radius:6px;padding:2px 8px">'+r.cat+'</span></div>'
    +'<button id="cs-done" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--t3)">Done</button>'
    +'</div>'
    +'<p style="font-size:13px;color:var(--t2);line-height:1.6;margin:0 0 16px">'+r.desc+'</p>'
    +'<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">When triggered</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button id="sev-auto" style="flex:1;padding:9px;border-radius:9px;border:1.5px solid '+(sev==='auto'?'#7C3AED':'#E5E7EB')+';background:'+(sev==='auto'?'#EDE9FE':'#fff')+';font-size:12px;font-weight:600;color:'+(sev==='auto'?'#5B21B6':'var(--t2)')+';cursor:pointer">Auto-fix</button>'
    +'<button id="sev-app" style="flex:1;padding:9px;border-radius:9px;border:1.5px solid '+(sev==='approval'?'#D97706':'#E5E7EB')+';background:'+(sev==='approval'?'#FEF3C7':'#fff')+';font-size:12px;font-weight:600;color:'+(sev==='approval'?'#92400E':'var(--t2)')+';cursor:pointer">Require approval</button>'
    +'</div>'+tRow+'</div>');
  setTimeout(function(){
    var d=document.getElementById('cs-done'); if(d) d.onclick=function(){hideSheet();};
    var sa=document.getElementById('sev-auto'); if(sa) sa.onclick=function(){S.compRules[id].severity='auto';showCompSheet(id);};
    var sp=document.getElementById('sev-app'); if(sp) sp.onclick=function(){S.compRules[id].severity='approval';showCompSheet(id);};
    var up=document.getElementById('ct-up'); if(up) up.onclick=function(){if(S.compRules[id].threshold!==null){S.compRules[id].threshold++;var v=document.getElementById('ct-val');if(v)v.textContent=S.compRules[id].threshold;}};
    var dn=document.getElementById('ct-dn'); if(dn) dn.onclick=function(){if(S.compRules[id].threshold!==null&&S.compRules[id].threshold>1){S.compRules[id].threshold--;var v=document.getElementById('ct-val');if(v)v.textContent=S.compRules[id].threshold;}};
  },50);
}

// ══════════════════════════════════════════════════════════
// DISPATCH
// ══════════════════════════════════════════════════════════
function draw(s){
  var m={
    chooser:chooser,
    home:home,
    connectBankStep:connectBankStep, collectMethod:collectMethod, reviewHours:reviewHours,
    payrollReview:payrollReview, payrollEmployeeList:payrollEmployeeList, complianceDetail:complianceDetail, finalApproval:finalApproval, submitted:submitted,
    ddFix:ddFix, otDecide:otDecide,
    team:team, empDetail:empDetail,
    terminate:terminate, termCalc:termCalc, termConfirm:termConfirm, termDone:termDone,
    rateChange:rateChange, rateConfirm:rateConfirm,
    scenarioModel:scenarioModel,
    bankBalance:bankBalance,
    settings:settings, settingsDetail:settingsDetail, automation:automation,
    payHistoryDetail:payHistoryDetail,
  };
  return (m[s]||function(){return '<div style="padding:40px;text-align:center;color:var(--t3)">Screen not found: '+s+'</div>';})();
}

// ══════════════════════════════════════════════════════════
// INIT — URL param ?path=a|b|c auto-selects a demo state;
// otherwise show the dev-only chooser.
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function(){
  initCompRules();
  var params=new URLSearchParams(window.location.search);
  var path=params.get('path');
  if(path==='a'||path==='b'||path==='c'){
    enterDemo(path);
  } else {
    go('chooser');
  }
});

</script>
